        const PlanningBoard = ({ monthLabel, planning, availableEventNames, saveStatus, onSave, onPrevMonth, onNextMonth, onAddActivity, onChangeActivityMetric, onBulkApplyActivityMetric, onChangeProfitSplit, onAssignPlacement, onRemovePlacement }) => {
            const [selectedActivity, setSelectedActivity] = useState('');
            const [draggingEventName, setDraggingEventName] = useState('');
            const [dragTargetKey, setDragTargetKey] = useState('');
            const [bulkMetricDraft, setBulkMetricDraft] = useState({ avgPax: '', revenuePerPax: '', costPerPax: '' });
            const boardRef = useRef(null);
            const calendarScrollRef = useRef(null);
            const matrixScrollRef = useRef(null);
            const pendingScrollSnapshotRef = useRef(null);
            const weekdayLabels = ['日', '一', '二', '三', '四', '五', '六'];
            const weekdayLabelsFull = weekdayLabels.map(label => `週${label}`);
            const dayColumnWidth = 100;
            const instructorColumnWidth = 100;
            const buildCellKey = (dateKey, instructorName) => `${String(dateKey || '').trim()}__${String(instructorName || '').trim()}`;
            const formatNumber = (value, digits = 0) => Number(value || 0).toLocaleString('zh-TW', { minimumFractionDigits: digits, maximumFractionDigits: digits });
            const formatCurrency = (value) => `$${Math.round(Number(value || 0)).toLocaleString()}`;
            const captureScrollSnapshot = () => {
                const mainScrollEl = boardRef.current?.closest('main');
                pendingScrollSnapshotRef.current = {
                    mainTop: mainScrollEl?.scrollTop ?? null,
                    mainLeft: mainScrollEl?.scrollLeft ?? null,
                    calendarLeft: calendarScrollRef.current?.scrollLeft ?? null,
                    matrixLeft: matrixScrollRef.current?.scrollLeft ?? null
                };
            };
            const getHeader = (dateKey) => {
                const [year, month, day] = String(dateKey || '').split('-').map(Number);
                const dt = new Date(year, (month || 1) - 1, day || 1);
                if (Number.isNaN(dt.getTime())) return { day: String(dateKey).slice(-2), weekday: '' };
                return { day, weekday: weekdayLabels[dt.getDay()] };
            };
            const getCellTone = (cell) => {
                if (cell?.simulatedPlacement) return `bg-violet-50 text-violet-700 border-violet-200${cell?.isPast ? ' opacity-80' : ''}`;
                const baseTone = ({
                    available: 'bg-emerald-100 text-emerald-800 border-emerald-300',
                    busy: 'bg-sky-50 text-sky-700 border-sky-200',
                    rest: 'bg-slate-200 text-slate-500 border-slate-300',
                    companyRest: 'bg-slate-300 text-slate-600 border-slate-400'
                }[cell?.state] || 'bg-white text-slate-400 border-slate-200');
                if (cell?.isPast && cell?.state === 'available') return 'bg-slate-50 text-slate-300 border-slate-100';
                return `${baseTone}${cell?.isPast ? ' opacity-70' : ''}`;
            };
            const getCalendarCellTone = (cell) => {
                if (cell?.simulatedPlacement) return `bg-violet-50/70${cell?.isPast ? ' opacity-80' : ''}`;
                return ({
                    available: 'bg-emerald-50/90 ring-1 ring-inset ring-emerald-200',
                    busy: 'bg-slate-50',
                    rest: 'bg-slate-200/90',
                    companyRest: 'bg-slate-300/80'
                }[cell?.state] || 'bg-white') + (cell?.isPast ? ' opacity-80' : '');
            };
            const getCalendarEmptyLabelTone = (cell) => {
                if (cell?.state === 'companyRest') return 'text-slate-600 font-semibold';
                if (cell?.state === 'rest') return 'text-slate-500 font-medium';
                if (cell?.isPast && cell?.state === 'available') return 'text-slate-300';
                if (cell?.state === 'busy') return 'text-slate-500';
                return draggingEventName && cell?.canDrop ? 'text-emerald-700 font-bold' : 'text-emerald-600 font-bold';
            };
            const getEntryTone = (type) => ({
                main: 'bg-sky-50 border-sky-100 text-sky-800',
                prep: 'bg-amber-50 border-amber-100 text-amber-800',
                cont: 'bg-violet-50 border-violet-100 text-violet-800',
                outing: 'bg-rose-50 border-rose-100 text-rose-800',
                simulated: 'bg-violet-50 border-violet-200 text-violet-800'
            }[type] || 'bg-slate-50 border-slate-200 text-slate-700');
            const getCompactCellLabel = (cell) => {
                if (cell?.simulatedPlacement) return '模';
                if (cell?.isPast && cell?.state === 'available') return '過';
                return ({
                    available: '可',
                    busy: '團',
                    rest: '休',
                    companyRest: '公'
                }[cell?.state] || '');
            };
            const getCalendarEmptyLabel = (cell) => {
                if (cell?.state === 'companyRest') return '公休';
                if (cell?.state === 'rest') return '排休';
                if (cell?.isPast && cell?.state === 'available') return '已過';
                if (cell?.state === 'busy') return '正式已排';
                return draggingEventName && cell?.canDrop ? '拖到這裡' : '可排';
            };
            const calendarRows = useMemo(() => planning.matrixRows.map(row => ({
                ...row,
                cellMap: Object.fromEntries((row.cells || []).map(cell => [cell.dateKey, cell]))
            })), [planning.matrixRows]);
            const calendarWeeks = useMemo(() => {
                const dates = Array.isArray(planning.matrixDates) ? planning.matrixDates : [];
                if (dates.length === 0) return [];
                const [year, month, day] = String(dates[0] || '').split('-').map(Number);
                const firstWeekday = new Date(year, (month || 1) - 1, day || 1).getDay();
                const padded = Array(firstWeekday).fill(null).concat(dates);
                while (padded.length % 7 !== 0) padded.push(null);
                const weeks = [];
                for (let i = 0; i < padded.length; i += 7) weeks.push(padded.slice(i, i + 7));
                return weeks;
            }, [planning.matrixDates]);
            const legendItems = [
                { label: '可排', tone: 'bg-emerald-100 text-emerald-800 border-emerald-300' },
                { label: '正式已排', tone: 'bg-sky-50 text-sky-700 border-sky-200' },
                { label: '模擬安排', tone: 'bg-violet-50 text-violet-700 border-violet-200' },
                { label: '排休', tone: 'bg-slate-200 text-slate-500 border-slate-300' },
                { label: '公休', tone: 'bg-slate-300 text-slate-600 border-slate-400' }
            ];
            const remainingEventOptions = (availableEventNames || []).filter(name => !planning.activityRows.some(row => row.name === name));
            const activityRowNames = useMemo(() => planning.activityRows.map(row => row.name), [planning.activityRows]);
            const actualSessionTotal = planning.activityRows.reduce((sum, row) => sum + (Number(row.actualSessions) || 0), 0);
            const summaryCards = [
                { label: '可排講師人日', value: `${formatNumber(planning.summary.openInstructorDays)} 人日`, note: '非公司公休、非個人排休、也沒有正式活動的講師人日', tone: 'border-emerald-100 bg-emerald-50', icon: 'calendar-days' },
                { label: '正式已排占用', value: `${formatNumber(planning.summary.actualBusyInstructorDays)} 人日`, note: `來自正式活動、前置、跨日、場勘`, tone: 'border-sky-100 bg-sky-50', icon: 'briefcase' },
                { label: '模擬總團數', value: `${formatNumber(planning.summary.simulatedSessions)} 團`, note: `全部來自拖曳模擬 ${formatNumber(planning.summary.droppedSessions)} 團`, tone: 'border-violet-100 bg-violet-50', icon: 'layout-grid' },
                { label: '預估總毛利', value: formatCurrency(planning.summary.plannedGrossProfit), note: `公司 ${planning.profitSplit.companyPct}% / 獎金 ${planning.profitSplit.bonusPct}%`, tone: 'border-amber-100 bg-amber-50', icon: 'trending-up' }
            ];
            const planningExcelSheets = useMemo(() => {
                const assumptionRows = [
                    ['活動名稱', '活動數', '平均人數', '每人營收', '每人成本', '每人毛利', '總毛利'],
                    ...planning.activityRows.map(row => ([
                        row.name,
                        Number(row.activityCount) || 0,
                        Number(row.avgPax) || 0,
                        Number(row.revenuePerPax) || 0,
                        Number(row.costPerPax) || 0,
                        Number(row.grossProfitPerPax) || 0,
                        Number(row.projectedGrossProfit) || 0
                    ])),
                    [],
                    ['總人數', Number(planning.summary.plannedPax) || 0],
                    ['毛利總和', Number(planning.summary.plannedGrossProfit) || 0],
                    ['公司毛利', Number(planning.summary.companyGrossProfit) || 0],
                    ['業績獎金', Number(planning.summary.bonusGrossProfit) || 0],
                    ['公司比例(%)', Number(planning.profitSplit.companyPct) || 0],
                    ['獎金比例(%)', Number(planning.profitSplit.bonusPct) || 0]
                ];

                const placementRows = [['日期', '講師', '活動名稱']];
                calendarRows.forEach(row => {
                    (planning.matrixDates || []).forEach(dateKey => {
                        const cell = row.cellMap[dateKey];
                        if (!cell?.simulatedPlacement?.eventName) return;
                        placementRows.push([dateKey, row.name, cell.simulatedPlacement.eventName]);
                    });
                });

                const calendarMatrixRows = [
                    ['講師', ...(planning.matrixDates || [])],
                    ...calendarRows.map(row => ([
                        row.name,
                        ...(planning.matrixDates || []).map(dateKey => row.cellMap[dateKey]?.simulatedPlacement?.eventName || '')
                    ]))
                ];

                return [
                    { name: `${monthLabel}模擬月曆`, rows: calendarMatrixRows },
                    { name: `${monthLabel}排班明細`, rows: placementRows },
                    { name: `${monthLabel}活動假設`, rows: assumptionRows }
                ];
            }, [monthLabel, planning, calendarRows]);
            const handleExportPlanningExcel = () => {
                downloadExcelWorkbook(planningExcelSheets, `${sanitizeFilename(monthLabel, '活動模擬')}_活動模擬.xls`);
            };
            const bulkMetricConfigs = [
                { field: 'avgPax', label: '平均人數整欄套用', hint: '一次覆蓋本表全部活動的平均人數', step: '0.1', inputClass: 'w-28 text-center', placeholder: '例如 18.5' },
                { field: 'revenuePerPax', label: '每人營收整欄套用', hint: '一次覆蓋本表全部活動的每人營收', step: '1', inputClass: 'w-32 text-right', placeholder: '例如 1800' },
                { field: 'costPerPax', label: '每人成本整欄套用', hint: '一次覆蓋本表全部活動的每人成本', step: '1', inputClass: 'w-32 text-right', placeholder: '例如 450' }
            ];
            const updateBulkMetricDraft = (field, value) => {
                setBulkMetricDraft(prev => ({ ...prev, [field]: value }));
            };
            const applyBulkMetric = (field) => {
                if (activityRowNames.length === 0) return;
                onBulkApplyActivityMetric(field, bulkMetricDraft[field], activityRowNames);
            };
            const clearBulkMetric = (field) => {
                if (activityRowNames.length === 0) return;
                onBulkApplyActivityMetric(field, '', activityRowNames);
                setBulkMetricDraft(prev => ({ ...prev, [field]: '' }));
            };
            const parseDragPayload = (event) => {
                const raw = event?.dataTransfer?.getData('application/x-crm-planning') || event?.dataTransfer?.getData('text/plain') || '';
                if (!raw) return null;
                try {
                    return JSON.parse(raw);
                } catch (e) {
                    return { eventName: raw };
                }
            };
            const handleDragStart = (payload) => (event) => {
                event.dataTransfer.setData('application/x-crm-planning', JSON.stringify(payload));
                event.dataTransfer.setData('text/plain', payload.eventName || '');
                event.dataTransfer.effectAllowed = 'move';
                setDraggingEventName(payload.eventName || '');
            };
            const handleDragEnd = () => {
                setDraggingEventName('');
                setDragTargetKey('');
            };
            const handleCellDragOver = (rowName, cell) => (event) => {
                if (!cell?.canDrop) return;
                if (!draggingEventName) return;
                event.preventDefault();
                event.dataTransfer.dropEffect = 'move';
                setDragTargetKey(buildCellKey(cell.dateKey, rowName));
            };
            const handleCellDrop = (rowName, cell) => (event) => {
                if (!cell?.canDrop) return;
                const payload = parseDragPayload(event);
                if (!payload?.eventName) return;
                event.preventDefault();
                captureScrollSnapshot();
                setDragTargetKey('');
                onAssignPlacement({
                    eventName: payload.eventName,
                    instructorName: rowName,
                    dateKey: cell.dateKey,
                    sourceDateKey: payload.sourceDateKey,
                    sourceInstructorName: payload.sourceInstructorName
                });
            };

            useEffect(() => {
                setSelectedActivity('');
                setDraggingEventName('');
                setDragTargetKey('');
                setBulkMetricDraft({ avgPax: '', revenuePerPax: '', costPerPax: '' });
            }, [monthLabel]);

            useLayoutEffect(() => {
                const snapshot = pendingScrollSnapshotRef.current;
                if (!snapshot) return undefined;
                const restoreFrame = requestAnimationFrame(() => {
                    const mainScrollEl = boardRef.current?.closest('main');
                    if (mainScrollEl && snapshot.mainTop !== null) {
                        mainScrollEl.scrollTop = snapshot.mainTop;
                        if (snapshot.mainLeft !== null) mainScrollEl.scrollLeft = snapshot.mainLeft;
                    }
                    if (calendarScrollRef.current && snapshot.calendarLeft !== null) {
                        calendarScrollRef.current.scrollLeft = snapshot.calendarLeft;
                    }
                    if (matrixScrollRef.current && snapshot.matrixLeft !== null) {
                        matrixScrollRef.current.scrollLeft = snapshot.matrixLeft;
                    }
                    pendingScrollSnapshotRef.current = null;
                });
                return () => cancelAnimationFrame(restoreFrame);
            }, [planning]);

            return (
                <div ref={boardRef} className="fade-in max-w-7xl mx-auto pb-20 space-y-6">

                                    <div className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-1">活動模擬</div>
                                    <div className="flex items-center gap-2">
                                        <button onClick={onPrevMonth} className="p-2 rounded-full hover:bg-white border border-slate-200 text-slate-500"><Icon name="chevron-left" size={16}/></button>

                                        <button onClick={onNextMonth} className="p-2 rounded-full hover:bg-white border border-slate-200 text-slate-500"><Icon name="chevron-right" size={16}/></button>
                                    </div>

                                </div>
                                <div className="flex items-center gap-3">
                                    <div className="text-xs text-slate-400">
                                        {saveStatus === 'saving' && '模擬資料儲存中...'}
                                        {saveStatus === 'success' && '模擬資料已儲存'}
                                        {saveStatus === 'error' && '模擬資料儲存失敗'}
                                        {saveStatus === 'idle' && '可按月份分別設定'}
                                    </div>
                                    <button onClick={handleExportPlanningExcel} className="bg-white hover:bg-slate-50 text-slate-700 px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 border border-slate-200 shadow-sm">
                                        <Icon name="download" size={16}/> 匯出 Excel
                                    </button>
                                    <button onClick={onSave} className="bg-slate-800 hover:bg-slate-900 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 shadow-sm">
                                        <Icon name="save" size={16}/> 儲存本月模擬
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div className="p-5 space-y-6">
                            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">
                                {summaryCards.map(card => (
                                    <div key={card.label} className={`rounded-2xl border p-4 ${card.tone}`}>
                                        <div className="flex items-center justify-between mb-3">
                                            <div className="text-xs font-bold uppercase tracking-wide text-slate-500">{card.label}</div>
                                            <Icon name={card.icon} size={16} className="text-slate-500"/>
                                        </div>
                                        <div className="text-3xl font-bold text-slate-800">{card.value}</div>
                                        <div className="mt-2 text-xs text-slate-500">{card.note}</div>
                                    </div>
                                ))}
                            </div>
                            <div className="flex flex-wrap gap-2">

        const TimeAnalysisModal = ({ title, data, onClose }) => {

        const ActivityPerformance = ({ parsedData, eventConfigs }) => {

    const loyaltyMetrics = useMemo(() => {

        parsedData.forEach((r) => {

        const heavy = Object.values(counts).filter((c) => c >= 3).length;
        
        return {
            rate: total > 0 ? ((repeat / total) * 100).toFixed(1) : "0.0",
            heavyRate: total > 0 ? ((heavy / total) * 100).toFixed(1) : "0.0",
            total: total

            const activityStats = useMemo(() => {

                parsedData.forEach(row => {

                    const sortedInstr = row.instructor ? row.instructor.split(/[&,]/).map(s=>s.trim()).sort().join(' & ') : '';
                    const rowKey = `${row.date}_${row.eventName}_${sortedInstr}`.replace(/[\/\\#\?]/g, '-');

                    stats[groupName].revenue += (row.price || 0);
                    stats[groupName].pax += 1;
                    stats[groupName].sessions.add(row.date + row.instructor);

                            <div className="text-lg font-bold text-blue-600 truncate" title={activityStats[0]?.name}>{activityStats[0]?.name || '-'}</div>

        const EnrollmentMonitor = ({ stats, eventConfigs, tagDefinitions }) => {
            const [filters, setFilters] = useState({ level: '', type: '', location: '' });
            const [sortBy, setSortBy] = useState('date');

            const processedEvents = useMemo(() => {
                const today = new Date().toISOString().split('T')[0];
                
                return Object.values(stats.events)
                    .map(e => {
                        const cfg = eventConfigs[e.key] || {};
                        const capacity = parseInt(cfg.capacity) || 12;
                        const rate = Math.min((e.count / capacity) * 100, 100);
                        const tags = cfg.tags || { levels: '', types: '', locations: '' };
                        const isFull = e.count >= capacity;
                        
                        return { ...e, capacity, rate, tags, isFull, cfg };
                    })
                    .filter(e => {
                        if (e.date < today) return false;
                        if (filters.level && e.tags.levels !== filters.level) return false;
                        if (filters.type && e.tags.types !== filters.type) return false;
                        if (filters.location && e.tags.locations !== filters.location) return false;
                        return true;
                    })
                    .sort((a, b) => {
                        if (sortBy === 'rate') return b.rate - a.rate;
                        return new Date(a.date) - new Date(b.date);
                    });
            }, [stats, eventConfigs, filters, sortBy]);

            const getProgressColor = (rate, isFull) => {
                if (isFull || rate >= 100) return 'bg-red-500';
                if (rate >= 80) return 'bg-orange-500';
                if (rate >= 50) return 'bg-blue-500';
                return 'bg-emerald-500';
            };

            return (
                <div className="fade-in max-w-6xl mx-auto space-y-6 pb-20">

        const useVisitorTracker = (db, dbSource, viewMode) => {
            useEffect(() => {
                if (!ANALYTICS_WRITE_ENABLED || viewMode === 'admin' || !db) return;

                const sessionId = `sess_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
                const todayStr = getLocalDateStr();
                const startTime = Date.now();
                let lastClickText = '進入網站';

                const initSession = async () => {
                    const batch = writeBatch(db);
                    const basePath = `artifacts/${dbSource}/analytics`;
                    const sessionRef = doc(db, basePath, 'traffic', 'sessions', sessionId);
                    if (!sessionRef) return;

                    batch.set(sessionRef, {
                        startTime: new Date().toISOString(),
                        date: todayStr,
                        userAgent: navigator.userAgent,
                        device: /Mobi|Android/i.test(navigator.userAgent) ? 'Mobile' : 'Desktop',
                        lastActive: new Date().toISOString(),
                        durationSeconds: 0,
                        lastAction: '進入網站',
                        page: '首頁'
                    });

                    // 寫入總計與日計
                    const totalRef = doc(db, basePath, 'stats', 'overview', 'total');
                    batch.set(totalRef, { count: firebase.firestore.FieldValue.increment(1) }, { merge: true });
                    const dailyRef = doc(db, basePath, 'stats', 'daily', todayStr);
                    batch.set(dailyRef, { count: firebase.firestore.FieldValue.increment(1) }, { merge: true });

                    try { await batch.commit(); } catch (e) { console.warn(e); }
                };

                initSession();

                const handleInteraction = (e) => {
                    if (e.type === 'click' && e.target) {
                        const eventTarget = e.target.closest('[data-analytics-event]');
                        if (eventTarget) {
                            lastClickText = `查看: ${eventTarget.getAttribute('data-analytics-event')}`;
                        } else {
                            const text = e.target.innerText || e.target.tagName;
                            lastClickText = text.substring(0, 20);
                        }
                    }
                };

                const flushSession = () => {
                    const duration = Math.floor((Date.now() - startTime) / 1000);
                    const sessionRef = doc(db, `artifacts/${dbSource}/analytics`, 'traffic', 'sessions', sessionId);
                    if (sessionRef) {
                        updateDoc(sessionRef, {
                            lastActive: new Date().toISOString(),
                            durationSeconds: duration,
                            lastAction: lastClickText
                        }).catch(() => {});
                    }
                };

                const timer = setInterval(flushSession, 60000);
                const handleVisibility = () => {
                    if (document.visibilityState === 'hidden') flushSession();
                };
                window.addEventListener('click', handleInteraction);
                document.addEventListener('visibilitychange', handleVisibility);
                window.addEventListener('beforeunload', flushSession);
                return () => {
                    window.removeEventListener('click', handleInteraction);
                    document.removeEventListener('visibilitychange', handleVisibility);
                    window.removeEventListener('beforeunload', flushSession);
                    clearInterval(timer);
                    flushSession();
                };
            }, [db, dbSource, viewMode]);
        };

                    list.sort((a, b) => new Date(b.startTime) - new Date(a.startTime));
                    setSessions(list);

                return () => { if(unsubTotal) unsubTotal(); if(unsubDaily) unsubDaily(); if(unsubSessions) unsubSessions(); };

            const processHourlyData = useMemo(() => {
                const hours = Array(24).fill(0).map((_, i) => ({ hour: `${i}時`, count: 0 }));
                sessions.forEach(s => {

                    const h = new Date(s.startTime).getHours();

            const processTrendData = useMemo(() => {
                const map = {};
                sessions.forEach(s => {
                    if (!s.startTime) return;
                    const d = new Date(s.startTime);
                    let key = '';
                    
                    if (trendMode === 'daily') {
                        key = s.date || d.toISOString().split('T')[0];
                    } else if (trendMode === 'weekly') {
                        const startOfYear = new Date(d.getFullYear(), 0, 1);
                        const days = Math.floor((d - startOfYear) / (24 * 60 * 60 * 1000));
                        const week = Math.ceil((days + 1) / 7);
                        key = `${d.getFullYear()} W${week}`;
                    } else if (trendMode === 'monthly') {
                        key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
                    }
                    map[key] = (map[key] || 0) + 1;
                });

                return Object.entries(map)
                    .map(([date, count]) => ({ date, count }))
                    .sort((a, b) => a.date.localeCompare(b.date))

            if (loading) return <div className="p-8 text-center text-slate-400"><Icon name="loader-2" className="animate-spin inline mr-2"/>讀取數據中...</div>;

            const avgDuration = sessions.length > 0 ? Math.round(sessions.reduce((a, b) => a + (b.durationSeconds || 0), 0) / sessions.length) : 0;

            // 確保元件存在
            if (!BarChart || !LineChart) return <div>Chart components missing</div>;

            return (
                <div className="fade-in max-w-6xl mx-auto pb-20 space-y-6">

                        </div>

                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-orange-100">

                                <div className="flex bg-slate-100 rounded-lg p-1">
                                    {['daily','weekly','monthly'].map(m => (

                            </div>
                            <div className="h-[250px] w-full">
                                <ResponsiveContainer width="100%" height="100%">
                                    <LineChart data={processTrendData}>

            }, [sourceProjects]);

            useEffect(() => {
                const list = allProjects.filter(p => p.status === workspaceMode);
                if (!activeProjectId && list.length > 0) setActiveProjectId(list[0].id);
                if (activeProjectId && !list.some(p => p.id === activeProjectId)) {

                    } catch (e) {
                        console.error("Project autosave error:", e);

                        setIsSaving(false);

                }, 1000);
                return () => clearTimeout(timer);
            }, [currentProject, user, db, dbSource]);

            const setProjectData = (field, value) => {
                setAllProjects(prev => prev.map(p => p.id === activeProjectId ? { ...p, [field]: value } : p));
            };

            const updateTask = (wpId, taskId, field, subfield, value) => {
                setAllProjects(prev => prev.map(p => {
                    if (p.id !== activeProjectId) return p;

                        ...p,
                        workPackages: p.workPackages.map(wp => {

                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4"><div><label className="block text-xs font-bold text-slate-500 mb-1">日期 *</label><input type="date" className="w-full p-2 border rounded-lg" value={newReg.date} onChange={e=>setNewReg({...newReg, date: e.target.value})} /></div><div><label className="block text-xs font-bold text-slate-500 mb-1">活動名稱 *</label><input type="text" className="w-full p-2 border rounded-lg" placeholder="例如: 登山團" value={newReg.eventName} onChange={e=>setNewReg({...newReg, eventName: e.target.value})} /></div><div><label className="block text-xs font-bold text-slate-500 mb-1">講師</label><input type="text" className="w-full p-2 border rounded-lg" placeholder="講師姓名" value={newReg.instructor} onChange={e=>setNewReg({...newReg, instructor: e.target.value})} /></div></div>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4"><div><label className="block text-xs font-bold text-slate-500 mb-1">客戶姓名 *</label><input type="text" className="w-full p-2 border rounded-lg" placeholder="王小明" value={newReg.customerName} onChange={e=>setNewReg({...newReg, customerName: e.target.value})} /></div><div><label className="block text-xs font-bold text-slate-500 mb-1">金額</label><input type="number" className="w-full p-2 border rounded-lg" placeholder="3000" value={newReg.price} onChange={e=>setNewReg({...newReg, price: e.target.value})} /></div><div><label className="block text-xs font-bold text-slate-500 mb-1">交通方式</label><select className="w-full p-2 border rounded-lg" value={newReg.transport} onChange={e=>setNewReg({...newReg, transport: e.target.value})}><option value="">未定</option><option value="共乘">共乘</option><option value="自行前往">自行前往</option></select></div></div>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4"><div><label className="block text-xs font-bold text-slate-500 mb-1">訂購日</label><input type="date" className="w-full p-2 border rounded-lg" value={newReg.orderDate} onChange={e=>setNewReg({...newReg, orderDate: e.target.value})} /></div><div><label className="block text-xs font-bold text-slate-500 mb-1">報名管道</label><input type="text" className="w-full p-2 border rounded-lg" placeholder="FB, IG..." value={newReg.source} onChange={e=>setNewReg({...newReg, source: e.target.value})} /></div><div><label className="block text-xs font-bold text-slate-500 mb-1">手機</label><input type="text" className="w-full p-2 border rounded-lg" placeholder="09xx..." value={newReg.phone} onChange={e=>setNewReg({...newReg, phone: e.target.value})} /></div></div>
                                    <div className="flex justify-end pt-2"><button onClick={handleAddManualReg} disabled={isSaving} className={`bg-blue-600 text-white px-6 py-2 rounded-lg flex items-center gap-2 transition-colors ${addRegStatus==='success'?'bg-green-600 hover:bg-green-700':'hover:bg-blue-700'}`}>{isSaving ? <Icon name="loader-2" className="animate-spin"/> : (addRegStatus==='success' ? <Icon name="check"/> : <Icon name="plus"/>)}{addRegStatus==='success' ? '新增成功！' : '新增一筆報名'}</button></div>
                                </div>
                            </section>
                            
                            <DataRescueTab currentAppId={dbSource} onSwitch={handleDbSourceChange} />
                        </div>}
                    </main>

                    {showDebug && <DebugPanel onClose={()=>setShowDebug(false)} />}
                    {showCreateEvent && <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 fade-in"><div className="bg-white rounded-2xl w-full max-w-lg p-6 shadow-2xl m-auto">
                        <CreateEventModal 
                            initialDate={scheduleDate} // [新增] 傳入點選的日期
                            initialInstructors={createEventPrefillInstructors}
                            companyRestDates={companyRestDates}
                            existingScheduleByDate={calendarOccupancy}
                            onClose={closeCreateEventModal} 
                            onSave={handleCreateEvent} 
                            customTemplates={customTemplates} 
                            onSaveTemplate={handleSaveTemplate} 
                            onDeleteTemplate={onDeleteTemplate} 
                            availableInstructors={Object.keys(stats.instrs).sort()} 
                            instructorSchedule={instructorSchedule} 
                            tagDefinitions={tagDefinitions}
                            onAddTag={handleAddTagDefinition}
                        />
                    </div></div>}
                    {showAddPromise && <AddPromiseModal onClose={()=>setShowAddPromise(false)} onSave={handleAddPromise} />}
                    {showBulkImport && <BulkImportModal onClose={()=>setShowBulkImport(false)} onImport={handleBulkImport} existingData={parsedData} />}
                    
                    {showScheduleModal && <InstructorScheduleModal 
                        date={scheduleDate} 
                        availableInstructors={Object.keys(stats.instrs).sort()} 
                        restingList={instructorSchedule[scheduleDate] || []} 
                        onClose={()=>setShowScheduleModal(false)} 
                        onToggle={handleToggleInstructorRest}
                        isCompanyRest={companyRestDates.includes(scheduleDate)}
                        onToggleCompanyRest={handleToggleCompanyRest}
                        isOutingDay={!!(outingDays[scheduleDate] && outingDays[scheduleDate].enabled)}
                        outingPosterFilename={outingDays[scheduleDate]?.posterFilename || ''}
                        outingPosterOptions={outingPosterConfig}
                        outingPeople={outingDays[scheduleDate]?.people || []}
                        onToggleOutingDay={handleToggleOutingDay}
                        onSetOutingPoster={handleSetOutingPoster}
                        onToggleOutingPerson={handleToggleOutingPerson}
                    />}
                    
                    {editingEvent && <EventManagerModal 
                        event={activeEditingEvent} 
                        config={eventConfigs[editingEvent.key]} 
                        onClose={()=>setEditingEvent(null)} 
                        onSaveConfig={(cfg, newInstr, newInternalName)=>handleSaveEventConfig(editingEvent.key, cfg, newInstr, newInternalName)} 
                        availableInstructors={Object.keys(stats.instrs).sort()} 
                        instructorSchedule={instructorSchedule} 
                        onCheckInToggle={handleCheckInToggle}
                        onDeleteEvent={handleDeleteEvent}
                        globalRules={globalRules}
                        onEditCustomer={(c) => setEditingRow(c)}
                        tagDefinitions={tagDefinitions}
                        onAddTag={handleAddTagDefinition}
                        parsedData={parsedData}
                        onAddDirectReg={handleAddDirectReg}
                        adminPassword={adminPassword} 
                    />}
                    
                    {editingProject && <ProjectDetailModal 
                        project={editingProject} 
                        onClose={()=>setEditingProject(null)} 
                        onUpdate={handleUpdateProject}
                        onDelete={handleDeleteProject}
                    />}

                    {showGlobalRules && <GlobalRulesModal currentRules={globalRules} onClose={()=>setShowGlobalRules(false)} onSave={async (newRules) => { await setDoc(doc(db, `artifacts/${dbSource}/public/data`, 'settings', 'main'), { globalRules: newRules }, { merge: true }); setShowGlobalRules(false); }} />}
                    
                    {showTagSettings && <TagSettingsModal currentDefs={tagDefinitions} onClose={()=>setShowTagSettings(false)} onSave={async (newDefs) => { await setDoc(doc(db, `artifacts/${dbSource}/public/data`, 'settings', 'main'), { tagDefinitions: newDefs }, { merge: true }); setShowTagSettings(false); }} />}
                    
                    {/* 新增：吉祥物設定 Modal */}
                    {showMascotSettings && <MascotSettingsModal currentList={mascotConfig} onClose={()=>setShowMascotSettings(false)} onSave={async (newList) => { await setDoc(doc(db, `artifacts/${dbSource}/public/data`, 'settings', 'main'), { mascotConfig: newList }, { merge: true }); setShowMascotSettings(false); }} />}
                    {showOutingPosterSettings && <OutingPosterSettingsModal currentList={outingPosterConfig} onClose={()=>setShowOutingPosterSettings(false)} onSave={async (newList) => { await setDoc(doc(db, `artifacts/${dbSource}/public/data`, 'settings', 'main'), { outingPosterConfig: newList }, { merge: true }); setShowOutingPosterSettings(false); }} />}
                    
                    {editingRow && <EditRowModal rowData={editingRow} existingTransports={uniqueTransports} onClose={()=>setEditingRow(null)} onSave={handleUpdateRow} onDelete={(id) => { handleDeleteRow(id); setEditingRow(null); }} />}
{/* ★ 加在這裡：匯出月曆資料的彈出視窗 */}
                    {showExportModal && <CalendarExportModal events={stats.events} eventConfigs={eventConfigs} onClose={()=>setShowExportModal(false)} />}
                    {showLoginModal && <LoginModal onClose={()=>setShowLoginModal(false)} onLogin={handleVerifyLogin} />}
                </div>
            );
        };

        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<MainApp />);
        } catch (error) {
            document.getElementById('root').innerHTML = '<div style="padding:20px;color:red"><h3>系統載入失敗</h3><p>請檢查 console 錯誤訊息。</p></div>';
            console.error("React Render Error:", error);
        }
    </script>
</body>
</html>
