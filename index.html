    <!-- 0. 白屏救星：全域錯誤捕捉 -->
    <script>
        window.onerror = function(msg, url, line, col, error) {
            // 忽略 ResizeObserver 錯誤，這是瀏覽器常見的良性錯誤
            if (msg.includes("ResizeObserver loop")) return false;
            
            document.body.innerHTML = `
                <div style="padding:20px; color:white; background:#ef4444; font-family:sans-serif; height:100vh; overflow:auto;">
                    <h2 style="margin-top:0;">⚠️ 系統發生錯誤 (白屏偵錯)</h2>
                    <p><strong>錯誤訊息:</strong> ${msg}</p>
                    <p><strong>位置:</strong> Line ${line}:${col}</p>
                    <pre style="background:rgba(0,0,0,0.2); padding:10px; border-radius:8px; overflow:auto; white-space:pre-wrap;">${error ? error.stack : 'No stack trace'}</pre>
                    <button onclick="location.reload()" style="background:white; color:#ef4444; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight:bold; margin-top:10px;">重新整理頁面</button>
                    <button onclick="localStorage.clear();location.reload()" style="background:transparent; border:1px solid white; color:white; padding:10px 20px; border-radius:5px; cursor:pointer; margin-top:10px; margin-left:10px;">清除快取並重整</button>
                </div>
            `;
            return false;
        };
    </script>

    <script type="text/babel">
        // --- 1. 安全啟動 React ---
        const { useState, useMemo, useEffect, useLayoutEffect, useRef } = React;

        // --- 2. Firebase 設定 ---
        const firebaseConfig = {
            apiKey: "AIzaSyBtfR8N9Dw9kG3jQSfJSs0p0MLvlQaOR74",
            authDomain: "crm-sys-4184a.firebaseapp.com",
            projectId: "crm-sys-4184a",
            storageBucket: "crm-sys-4184a.firebasestorage.app",
            messagingSenderId: "943273685158",
            appId: "1:943273685158:web:8ca441dd78dcb5b956c467",
            measurementId: "G-2M2W340ZKB"
        };

        // 安全初始化 Firebase
        let app, auth, db;
        try {
            if (typeof firebase !== 'undefined' && firebase.apps) {
                if (!firebase.apps.length) {
                    app = firebase.initializeApp(firebaseConfig);
                } else {
                    app = firebase.app();
                }
                auth = firebase.auth();
                db = firebase.firestore();

                try {
                    // Prefer auto detect to avoid hard-locking on long polling in some environments.
                    const forceLongPolling = localStorage.getItem('crm_force_long_polling') === '1';
                    if (forceLongPolling) {
                        db.settings({ experimentalForceLongPolling: true });
                    } else {
                        db.settings({ experimentalAutoDetectLongPolling: true });
                    }
                } catch (error) {
                    console.warn("Firebase settings failed (safe to ignore):", error);
                }
                console.log("Firebase initialized successfully");
            } else {
                console.error("Firebase SDK not loaded.");
            }
        } catch (e) {
            console.error("Firebase initialization failed:", e);
        }

        // --- 3. Firebase 語法相容層 (Adapter) ---
        const wrapSnapshot = (snap) => {
            if (!snap) return null;
            if (snap.docs) return snap; 
            return {
                id: snap.id,
                ref: snap.ref,
                metadata: snap.metadata,
                data: () => snap.data(),
                exists: () => snap.exists,
                _original: snap
            };
        };
        const collection = (dbInstance, ...pathSegments) => { if (!dbInstance) return null; return dbInstance.collection(pathSegments.join('/')); };
        const doc = (dbInstance, ...pathSegments) => { if (!dbInstance) return null; return dbInstance.doc ? dbInstance.doc(pathSegments.join('/')) : db.doc(pathSegments.join('/')); };

        const FIRESTORE_WRITE_TIMEOUT_MS = 8000;
        const withWriteTimeout = async (promise, ms, stage) => {
            let timer;
            try {
                return await Promise.race([
                    promise,
                    new Promise((_, reject) => {
                        timer = setTimeout(() => reject({ code: 'deadline-exceeded', message: `${stage} timeout ${ms}ms` }), ms);
                    })
                ]);
            } finally {
                if (timer) clearTimeout(timer);
            }
        };
        const isDeadlineExceeded = (error) => String(error?.code || '').includes('deadline-exceeded');
        const encodeDocPathForRest = (docPath) => String(docPath || '').split('/').map(s => encodeURIComponent(s)).join('/');
        const toFirestoreRestValue = (value) => {
            if (value === undefined) return { nullValue: null };
            if (value === null) return { nullValue: null };
            if (typeof value === 'string') return { stringValue: value };
            if (typeof value === 'boolean') return { booleanValue: value };
            if (typeof value === 'number') {
                if (!Number.isFinite(value)) return { nullValue: null };
                if (Number.isInteger(value)) return { integerValue: String(value) };
                return { doubleValue: value };
            }
            if (value instanceof Date) return { timestampValue: value.toISOString() };
            if (Array.isArray(value)) return { arrayValue: { values: value.map(v => toFirestoreRestValue(v)) } };
            if (typeof value === 'object') {
                const fields = {};
                Object.keys(value).forEach((k) => {
                    if (value[k] !== undefined) fields[k] = toFirestoreRestValue(value[k]);
                });
                return { mapValue: { fields } };
            }
            return { stringValue: String(value) };
        };
        const getAuthTokenForRest = async () => {
            if (!auth) throw { code: 'unauthenticated', message: 'Firebase Auth 未初始化' };
            let currentUser = auth.currentUser;
            if (!currentUser) {
                try { await auth.signInAnonymously(); } catch (_) {}
                currentUser = auth.currentUser;
            }
            if (!currentUser) throw { code: 'unauthenticated', message: '尚未登入匿名帳號' };
            return currentUser.getIdToken(true);
        };
        const restPatchDoc = async (docPath, data, opts = {}) => {
            const keys = Object.keys(data || {});
            if ((opts.merge || opts.update) && keys.length === 0) return null;

            const params = [];
            if (opts.merge || opts.update) {
                keys.forEach((k) => params.push(`updateMask.fieldPaths=${encodeURIComponent(k)}`));
            }
            if (opts.update) params.push('currentDocument.exists=true');
            const query = params.length ? `?${params.join('&')}` : '';
            const url = `https://firestore.googleapis.com/v1/projects/${firebaseConfig.projectId}/databases/(default)/documents/${encodeDocPathForRest(docPath)}${query}`;
            const body = { fields: {} };
            keys.forEach((k) => { body.fields[k] = toFirestoreRestValue(data[k]); });

            const token = await getAuthTokenForRest();
            const res = await fetch(url, {
                method: 'PATCH',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(body)
            });
            if (!res.ok) {
                const text = await res.text().catch(() => '');
                throw { code: `http-${res.status}`, message: `REST PATCH 失敗: ${text.slice(0, 220) || res.statusText}` };
            }
            return res.json().catch(() => null);
        };
        const restDeleteDoc = async (docPath) => {
            const token = await getAuthTokenForRest();
            const url = `https://firestore.googleapis.com/v1/projects/${firebaseConfig.projectId}/databases/(default)/documents/${encodeDocPathForRest(docPath)}`;
            const res = await fetch(url, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.status === 404) return null;
            if (!res.ok) {
                const text = await res.text().catch(() => '');
                throw { code: `http-${res.status}`, message: `REST DELETE 失敗: ${text.slice(0, 220) || res.statusText}` };
            }
            return null;
        };
        const setDoc = async (docRef, data, options) => {
            if (!docRef) return;
            try {
                return await withWriteTimeout(docRef.set(data, options), FIRESTORE_WRITE_TIMEOUT_MS, 'setDoc');
            } catch (error) {
                if (!isDeadlineExceeded(error)) throw error;
                console.warn('setDoc timeout, fallback to REST PATCH:', docRef.path);
                return restPatchDoc(docRef.path, data || {}, { merge: !!(options && options.merge) });
            }
        };
        const updateDoc = async (docRef, data) => {
            if (!docRef) return;
            try {
                return await withWriteTimeout(docRef.update(data), FIRESTORE_WRITE_TIMEOUT_MS, 'updateDoc');
            } catch (error) {
                if (!isDeadlineExceeded(error)) throw error;
                console.warn('updateDoc timeout, fallback to REST PATCH:', docRef.path);
                return restPatchDoc(docRef.path, data || {}, { update: true });
            }
        };
        const deleteDoc = async (docRef) => {
            if (!docRef) return;
            try {
                return await withWriteTimeout(docRef.delete(), FIRESTORE_WRITE_TIMEOUT_MS, 'deleteDoc');
            } catch (error) {
                if (!isDeadlineExceeded(error)) throw error;
                console.warn('deleteDoc timeout, fallback to REST DELETE:', docRef.path);
                return restDeleteDoc(docRef.path);
            }
        };
        const addDoc = async (collRef, data) => {
            if (!collRef) return;
            try {
                return await withWriteTimeout(collRef.add(data), FIRESTORE_WRITE_TIMEOUT_MS, 'addDoc');
            } catch (error) {
                if (!isDeadlineExceeded(error)) throw error;
                const fallbackRef = collRef.doc();
                console.warn('addDoc timeout, fallback to REST PATCH:', fallbackRef.path);
                await restPatchDoc(fallbackRef.path, data || {}, {});
                return fallbackRef;
            }
        };
        const writeBatch = (dbInstance) => dbInstance.batch();
        const onSnapshot = (ref, callback) => {
            if (!ref) return () => {};
            return ref.onSnapshot(
                (snap) => callback(wrapSnapshot(snap)),
                (error) => { console.warn("Firestore 讀取失敗:", error); }
            );
        };
        const signInAnonymously = (authInstance) => authInstance.signInAnonymously();
        const onAuthStateChanged = (authInstance, callback) => authInstance.onAuthStateChanged(callback);

        const defaultAppId = 'default-app-id';
        const APP_BUILD = '2026-03-03 23:45';
        const readFlag = (key, defaultValue = false) => {
            try {
                return localStorage.getItem(key) === '1';
            } catch (_) {
                return defaultValue;
            }
        };
        // Emergency quota guard: analytics writes are OFF by default on Spark plan.
        const ANALYTICS_WRITE_ENABLED = readFlag('crm_enable_analytics_write', false);
        const MASCOT_WRITE_ENABLED = readFlag('crm_enable_mascot_write', false);
        const CSV_HEADER = "日期,活動名稱,講師,客戶姓名,金額,交通方式,身分證字號,生日,Email,報名管道,社群暱稱,備註,訂購日,手機,報到狀態";
       
        // --- Utils & Constants ---
        const getLocalDateStr = () => {
            const d = new Date();
            const offset = d.getTimezoneOffset() * 60000;
            const localISOTime = (new Date(d - offset)).toISOString().slice(0, 10);
            return localISOTime;
        };

        const Logo = ({ className }) => {
            return (
                <div className={`flex items-center justify-center ${className}`}>
                    <img src="LOGO修復檔.png" className="h-8 w-auto object-contain" alt="Logo" />
                </div>
            );
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (!window.lucide) return;
                const { icons, createElement } = window.lucide;
                const iconName = name.split('-').map(part => part.charAt(0).toUpperCase() + part.slice(1)).join('');
                const iconNode = icons[iconName];
                if (iconNode && containerRef.current) {
                    containerRef.current.innerHTML = '';
                    const svgElement = createElement(iconNode);
                    svgElement.setAttribute('width', size);
                    svgElement.setAttribute('height', size);
                    const existingClass = svgElement.getAttribute('class') || '';
                    svgElement.setAttribute('class', `${existingClass} ${className}`.trim());
                    containerRef.current.appendChild(svgElement);
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center shrink-0"></span>;
        };

        const TagSelector = ({ definitions, value, onChange, onAddTag }) => {
            const renderGroup = (label, type, options, colorClass, activeColorClass) => (
                <div className="mb-3">
                    <label className="text-xs font-bold text-slate-500 mb-1.5 block flex items-center justify-between">
                        {label}
                        <button 
                            onClick={() => {
                                const newTag = prompt(`新增${label}標籤:`);
                                if (newTag) onAddTag(type, newTag);

                        >
                            + 新增
                        </button>
                    </label>
                    <div className="flex flex-wrap gap-2">
                        {options.map(opt => (
                            <button
                                key={opt}
                                type="button"
                                onClick={() => onChange(type, value[type] === opt ? '' : opt)}
                                className={`px-3 py-1.5 text-xs rounded-lg border transition-all ${
                                    value[type] === opt 
                                    ? activeColorClass 
                                    : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'
                                }`}
                            >
                                {opt}
                            </button>
                        ))}
                        {options.length === 0 && <span className="text-xs text-slate-300 italic">無選項</span>}
                    </div>
                </div>
            );

            return (
                <div className="bg-slate-50 p-3 rounded-xl border border-slate-200">
                    {renderGroup('活動等級', 'levels', definitions.levels || [], 'border-blue-200', 'bg-blue-600 text-white border-blue-600 shadow-sm')}
                    {renderGroup('活動種類', 'types', definitions.types || [], 'border-emerald-200', 'bg-emerald-600 text-white border-emerald-600 shadow-sm')}
                    {renderGroup('活動地點', 'locations', definitions.locations || [], 'border-purple-200', 'bg-purple-600 text-white border-purple-600 shadow-sm')}
                </div>
            );
        };

        const DebugPanel = ({ onClose }) => (
            <div className="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4">
                <div className="bg-white p-6 rounded-xl shadow-2xl max-w-sm w-full">
                    <h3 className="font-bold text-lg mb-2">系統狀態</h3>
                    <div className="bg-slate-100 p-3 rounded text-xs font-mono text-slate-600 mb-4">Status: Online (Safe Mode)<br/>Version: 3.8.6 (BugFix)<br/>Firebase: Compat</div>
                    <button onClick={onClose} className="w-full bg-slate-800 text-white py-2 rounded-lg text-sm">關閉</button>

        const DEFAULT_TASKS_TEMPLATE = [
            { id: 'insurance', type: 'insurance', name: '辦理保險', fields: [{ label: '保單號碼', value: '' }], completed: false },

        ];
       
        const DEFAULT_TAG_DEFS = {

            types: ['蛇類觀察', '夜間生態', '步道導覽', '生態講座', '蛙類觀察', '昆蟲觀察'],

        };

        const DEFAULT_PUBLIC_THEME = {
            pageBg: '#fff7ed',
            pageBgAlt: '#fef3c7',
            surfaceBg: '#ffffff',
            surfaceBorder: '#fde68a',

        };

        const PUBLIC_THEME_PRESETS = [
            { id: 'sunny', label: '晴空琥珀', values: { pageBg: '#fff7ed', pageBgAlt: '#fef3c7', surfaceBg: '#ffffff', surfaceBorder: '#fde68a', textColor: '#334155', titleColor: '#1e293b', accentColor: '#2563eb' } },
            { id: 'forest', label: '森林薄霧', values: { pageBg: '#ecfdf5', pageBgAlt: '#d1fae5', surfaceBg: '#ffffff', surfaceBorder: '#a7f3d0', textColor: '#14532d', titleColor: '#064e3b', accentColor: '#059669' } },
            { id: 'ocean', label: '海洋晨光', values: { pageBg: '#f0f9ff', pageBgAlt: '#dbeafe', surfaceBg: '#ffffff', surfaceBorder: '#bfdbfe', textColor: '#1e3a8a', titleColor: '#1e40af', accentColor: '#0284c7' } },
            { id: 'newyear', label: '新年喜慶', values: { pageBg: '#fff1f2', pageBgAlt: '#ffe4b5', surfaceBg: '#fffaf0', surfaceBorder: '#f59e0b', textColor: '#7f1d1d', titleColor: '#991b1b', accentColor: '#dc2626' } }
        ];

        const normalizePublicTheme = (theme) => ({ ...DEFAULT_PUBLIC_THEME, ...(theme || {}) });

        const DEFAULT_PUBLIC_SIDE_DECOR = {
            leftImage: '',
            rightImage: '',
            width: 180,

            offsetY: 0,
            offsetX: 24,
            opacity: 1
        };

        const DEFAULT_OUTING_POSTER_CONFIG = [
            { filename: 'new-year.gif', label: '新年出外', weight: 40 },
            { filename: 'climbing.gif', label: '山林取材', weight: 35 },
            { filename: 'frog_jumping.gif', label: '野外觀察', weight: 25 }
        ];

        const normalizePublicSideDecor = (decor) => ({

            // 只使用新錨點偏移，不再吃舊 top
            offsetY: Number((decor && decor.offsetY) ?? DEFAULT_PUBLIC_SIDE_DECOR.offsetY),

        });

        const COLOR_OPTIONS = [
            { value: 'blue', label: '藍色 (正常)', bg: 'bg-blue-50', border: 'border-blue-100', text: 'text-blue-600', hover: 'hover:bg-blue-100' },
            { value: 'green', label: '綠色 (充足)', bg: 'bg-green-50', border: 'border-green-100', text: 'text-green-600', hover: 'hover:bg-green-100' },
            { value: 'orange', label: '橘色 (緊張)', bg: 'bg-orange-50', border: 'border-orange-100', text: 'text-orange-600', hover: 'hover:bg-orange-100' },
            { value: 'red', label: '紅色 (滿員)', bg: 'bg-red-50', border: 'border-red-100', text: 'text-red-600', hover: 'hover:bg-red-100' },
            { value: 'purple', label: '紫色 (特別)', bg: 'bg-purple-50', border: 'border-purple-100', text: 'text-purple-600', hover: 'hover:bg-purple-100' },
            { value: 'slate', label: '灰色 (截止)', bg: 'bg-slate-50', border: 'border-slate-200', text: 'text-slate-500', hover: 'hover:bg-slate-100' },
        ];

        const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
        const getFirstDayOfMonth = (year, month) => new Date(year, month, 1).getDay();
        const getDayOfYear = (dateStr) => {
            const date = new Date(dateStr);
            if (isNaN(date.getTime())) return 0;
            const start = new Date(date.getFullYear(), 0, 0);
            const diff = date - start;

        const getWeightedOutingPoster = (posterList, excludeFilename = null) => {
            if (!Array.isArray(posterList) || posterList.length === 0) return null;
            const validList = posterList
                .filter(item => item && item.filename)
                .map(item => ({ ...item, weight: Math.max(1, parseInt(item.weight, 10) || 1) }));
            if (validList.length === 0) return null;
            const shouldExclude = excludeFilename && validList.length > 1 && validList.some(item => item.filename === excludeFilename);
            const candidateList = shouldExclude
                ? validList.filter(item => item.filename !== excludeFilename)
                : validList;
            const totalWeight = candidateList.reduce((sum, item) => sum + item.weight, 0);
            let cursor = Math.random() * totalWeight;
            for (const item of candidateList) {
                if (cursor < item.weight) return item;
                cursor -= item.weight;
            }
            return candidateList[0];

            const diffMs = due - now;

                        const isNumber = typeof cell === 'number' && Number.isFinite(cell);
                        const type = isNumber ? 'Number' : 'String';
                        const value = isNumber ? String(cell) : escapeSpreadsheetXml(cell);
                        return `<Cell><Data ss:Type="${type}">${value}</Data></Cell>`;
                    }).join('');
                    return `<Row>${cellsXml}</Row>`;
                }).join('');
                return `<Worksheet ss:Name="${escapeSpreadsheetXml(normalizeWorksheetName(sheet?.name, `Sheet${sheetIndex + 1}`))}"><Table>${rowsXml}</Table></Worksheet>`;

<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"
 xmlns:o="urn:schemas-microsoft-com:office:office"

            const removeRule = (idx) => setRules(rules.filter((_, i) => i !== idx));

 className="text-[10px] text-slate-400">顏色</span><select className="w-full p-1 text-xs border rounded" value={newRule.color} onChange={e=>setNewRule({...newRule, color: e.target.value})}>{COLOR_OPTIONS.map(c=><option key={c.value} value={c.value}>{c.label}</option>)}</select></div><button onClick={addRule} className="h-[26px] bg-slate-800 text-white text-xs rounded hover:bg-slate-700">新增</button></div></div><div className="flex justify-end gap-2"><button onClick={onClose} className="px-4 py-2 text-slate-500 hover:bg-slate-100 rounded-lg text-sm">取消</button><button onClick={()=>onSave(rules)} className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm shadow-md">儲存設定</button></div></div></div>);

                if (!newItem.value.trim()) return;

                setDefs(updated);
                setNewItem({ ...newItem, value: '' });

                const updated = { ...defs, [type]: defs[type].filter((_, i) => i !== index) };

                if (!draft.filename.trim()) return alert("請輸入圖片檔名或網址");

                    filename: draft.filename.trim(),
                    label: draft.label.trim() || draft.filename.trim(),
                    weight: Math.max(1, parseInt(draft.weight, 10) || 1)

                const next = [...list];

                setEditIdx(null);

            const handleEdit = (idx) => {
                setEditIdx(idx);
                setDraft(list[idx]);

            const handleDelete = (idx) => {
                const next = list.filter((_, i) => i !== idx);
                setList(next);
                if (editIdx === idx) {
                    setEditIdx(null);
                    setDraft({ filename: '', label: '', weight: 10 });
                }

                <div className="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4 fade-in backdrop-blur-sm">

            const activeTheme = themes.find(t => t.id === selectedThemeId) || themes[0];

            const addTheme = () => {
                const name = prompt("請輸入新主題名稱 (例如: 蛙類系列)");
                if (!name) return;
                const newId = `theme_${Date.now()}`;
                const newTheme = { id: newId, name, keywords: '', gifs: [] };
                const newThemes = [...themes, newTheme];
                setThemes(newThemes);
                setSelectedThemeId(newId);
            };

            const deleteTheme = (id) => {
                if (themes.length <= 1) return alert("至少保留一個主題");
                if (!confirm("確定刪除此主題及所有設定？")) return;
                const newThemes = themes.filter(t => t.id !== id);

                setSelectedThemeId(newThemes[0].id);

                setNewGif({ filename: '', action: '', weight: 10 });

                if (totalWeight <= 0) return gifList[0];
                let random = Math.random() * totalWeight;
                for (const item of gifList) {
                    if (random < (Number(item.weight) || 0)) return item;

        };
// --- 月曆資料匯出模組 ---
        const CalendarExportModal = ({ events, eventConfigs, onClose }) => {
            const getTodayDateStr = () => {
                const d = new Date();
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${y}-${m}-${day}`;
            };

            const normalizeDateString = (value) => {
                if (!value) return '';
                const raw = String(value).trim();
                const match = raw.match(/^(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})/);
                if (match) {
                    const y = parseInt(match[1], 10);
                    const m = parseInt(match[2], 10);
                    const d = parseInt(match[3], 10);
                    const dt = new Date(y, m - 1, d);
                    if (dt.getFullYear() === y && dt.getMonth() === m - 1 && dt.getDate() === d) {
                        return `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    }
                }
                const dt = new Date(raw);
                if (isNaN(dt.getTime())) return '';
                return `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}-${String(dt.getDate()).padStart(2, '0')}`;
            };

            const handleRequestClose = (e) => {
                if (e) e.stopPropagation();
                onClose();
            };

            const toMonthStr = (dateStr) => {
                if (!dateStr) return '';
                return dateStr.slice(0, 7);
            };

            const formatExportDate = (value) => {
                const normalized = normalizeDateString(value);
                if (!normalized) return value || '';
                const [y, m, d] = normalized.split('-');
                return `${y}/${m}/${d}`;
            };
            
            const defaultEndDate = useMemo(() => {
                try {
                    const list = Object.values(events);
                    if (list.length === 0) {
                        const d = new Date();
                        d.setMonth(d.getMonth() + 1);
                        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                    }

                    const validDates = list
                        .map(e => e.date)
                        .map(normalizeDateString)
                        .filter(Boolean)
                        .sort();

                    if (validDates.length > 0) {
                        return validDates[validDates.length - 1];
                    }
                } catch (e) {
                    console.error("日期計算錯誤", e);
                }
                
                return getTodayDateStr();
            }, [events]);

            const monthOptions = useMemo(() => {
                const months = new Set();
                Object.values(events).forEach(e => {
                    const normalized = normalizeDateString(e.date);
                    if (normalized) months.add(toMonthStr(normalized));
                });
                return Array.from(months).sort((a, b) => b.localeCompare(a));
            }, [events]);

            const [exportMode, setExportMode] = useState('calendar');
            const [startDate, setStartDate] = useState(getTodayDateStr());
            const [endDate, setEndDate] = useState(defaultEndDate); 
            const [listingDate, setListingDate] = useState(getTodayDateStr()); 
            const [selectedTypes, setSelectedTypes] = useState([]);
            const [selectedMonth, setSelectedMonth] = useState(monthOptions[0] || getTodayDateStr().slice(0, 7));

            useEffect(() => {
                if (defaultEndDate) {
                    setEndDate(defaultEndDate);
                }
            }, [defaultEndDate]);

            useEffect(() => {
                if (monthOptions.length === 0) {
                    setSelectedMonth(getTodayDateStr().slice(0, 7));
                    return;
                }
                if (!monthOptions.includes(selectedMonth)) {
                    setSelectedMonth(monthOptions[0]);
                }
            }, [monthOptions, selectedMonth]);

            const uniqueEventNames = useMemo(() => {
                const names = new Set();
                Object.values(events).forEach(e => {
                    const normalized = normalizeDateString(e.date);
                    if (normalized && normalized >= startDate && normalized <= endDate) {
                        names.add(e.eventName);
                    }
                });
                return Array.from(names).sort();
            }, [events, startDate, endDate]);

            const handleToggleType = (name) => {
                if (selectedTypes.includes(name)) {
                    setSelectedTypes(selectedTypes.filter(t => t !== name));
                } else {
                    setSelectedTypes([...selectedTypes, name]);
                }
            };

            const selectAll = () => setSelectedTypes(uniqueEventNames);
            const clearAll = () => setSelectedTypes([]);

            const monthlyStats = useMemo(() => {
                const instructorMap = {};
                const validEvents = Object.values(events)
                    .filter(e => {
                        const normalized = normalizeDateString(e.date);
                        if (!normalized) return false;
                        const cfg = eventConfigs[e.key] || {};
                        return toMonthStr(normalized) === selectedMonth && !cfg.isCancelled;
                    })
                    .sort((a, b) => normalizeDateString(a.date).localeCompare(normalizeDateString(b.date)));

                validEvents.forEach(e => {
                    const cfg = eventConfigs[e.key] || {};
                    const names = (cfg.leadInstructors && cfg.leadInstructors.length > 0)
                        ? cfg.leadInstructors
                        : (e.instructor || '未定')
                            .split(/[&,]/)
                            .map(s => s.trim())
                            .filter(Boolean);
                    const finalNames = names.length > 0 ? names : ['未定'];
                    finalNames.forEach(name => {
                        instructorMap[name] = (instructorMap[name] || 0) + 1;
                    });
                });

                const instructorRows = Object.entries(instructorMap)
                    .sort((a, b) => (b[1] - a[1]) || a[0].localeCompare(b[0]));

                return {
                    totalGroups: validEvents.length,
                    instructorRows
                };
            }, [events, eventConfigs, selectedMonth]);

            const handleExport = () => {
                if (exportMode === 'monthly') {
                    if (!selectedMonth) return alert("請先選擇月份");
                    if (monthlyStats.totalGroups === 0) return alert("該月份無可匯出資料（可能都被標記為流團）");

                    let csvContent = "\uFEFF月份,總團數(已扣除流團)\n";
                    csvContent += `${selectedMonth},${monthlyStats.totalGroups}\n\n`;
                    csvContent += "講師,出團量\n";
                    monthlyStats.instructorRows.forEach(([name, count]) => {
                        csvContent += `${toCSVField(name)},${count}\n`;
                    });

                    downloadCSV(csvContent, `出團統計_${selectedMonth}.csv`);
                    onClose();
                    return;
                }

                const filteredEvents = Object.values(events).filter(e => {
                    const normalized = normalizeDateString(e.date);
                    if (!normalized) return false;
                    const inDate = normalized >= startDate && normalized <= endDate;
                    const inType = selectedTypes.length === 0 || selectedTypes.includes(e.eventName);
                    return inDate && inType;
                }).sort((a, b) => {
                    const da = normalizeDateString(a.date);
                    const db = normalizeDateString(b.date);
                    return da.localeCompare(db);
                });

                if (filteredEvents.length === 0) return alert("無符合條件的資料");

                let csvContent = "\uFEFF講師,日期,,,,活動名稱,,,,,,,,,,,上架時間,一般票價格\n";

                filteredEvents.forEach(e => {
                    const cfg = eventConfigs[e.key] || {};
                    const colA = toCSVField(e.instructor || '未定');
                    
                    const colB = formatExportDate(e.date);

                    const colF = toCSVField(e.eventName);
                    
                    const colQ = formatExportDate(listingDate);
                    
                    let price = cfg.price || 0;
                    if (!price && e.customers && e.customers.length > 0) {
                        const validP = e.customers.find(c => c.price > 0);
                        if (validP) price = validP.price;
                    }
                    const colR = price;

                    const row = `${colA},${colB},,,,${colF},,,,,,,,,,,${colQ},${colR}`;
                    csvContent += row + "\n";
                });

                downloadCSV(csvContent, `月曆匯出_${startDate}_${endDate}.csv`);
                onClose();
            };

            return (
                <div className="fixed inset-0 bg-black/50 z-[90] flex items-center justify-center p-4 fade-in backdrop-blur-sm">
                    <div className="bg-white rounded-2xl w-full max-w-lg p-6 shadow-2xl">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                <Icon name="download" className="text-blue-600"/> 匯出月曆資料
                            </h3>
                            <button onClick={handleRequestClose}><Icon name="x" className="text-slate-400 hover:text-slate-600"/></button>
                        </div>

                                            <div className={`px-2.5 py-1 rounded-full text-xs font-bold border ${row.upcomingAvailableCount > 0 ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-slate-50 text-slate-400 border-slate-200'}`}>
                                                {row.upcomingAvailableCount} 天
                                            </div>
                                        </div>
                                        {row.upcomingAvailableDates.length > 0 ? (
                                            <div className="flex flex-wrap gap-1.5">
                                                {row.upcomingAvailableDates.map(dateKey => (
                                                    <span key={`${row.name}_${dateKey}`} className="px-2 py-1 rounded-lg bg-emerald-50 text-emerald-700 border border-emerald-100 text-xs font-bold">
                                                        {formatDayChip(dateKey)}
                                                    </span>
                                                ))}
                                            </div>
                                        ) : (
                                            <div className="text-xs text-slate-400 bg-slate-50 border border-slate-100 rounded-lg px-3 py-2">本月剩餘日期沒有可排空檔</div>
                                        )}
                                    </div>
                                ))}
                                {actuals.availabilityByInstructor.length === 0 && (
                                    <div className="md:col-span-2 xl:col-span-3 text-center text-slate-400 py-8 bg-white rounded-xl border border-dashed border-emerald-100">
                                        目前尚無可計算的講師資料。
                                    </div>
                                )}
                            </div>
                        </div>
                        <div className="bg-white border border-slate-200 rounded-2xl p-4">
                            <div className="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between mb-4">
                                <div>
                                    <h3 className="text-sm font-bold text-slate-700 flex items-center gap-2"><Icon name="grid-2x2" size={16}/> 講師 x 日期矩陣</h3>
                                    <p className="text-xs text-slate-400 mt-1">整月一眼看完誰在哪一天可排。綠色可排、藍色已排、紅色排休、灰色公休或已過。</p>
                                </div>
                                <div className="flex flex-wrap gap-2">
                                    {matrixLegendItems.map(item => (
                                        <div key={item.label} className={`px-2.5 py-1 rounded-full border text-[11px] font-bold ${item.tone}`}>
                                            {item.label}
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="min-w-[1100px] border-separate border-spacing-1 text-xs">
                                    <thead>
                                        <tr>
                                            <th className="sticky left-0 z-20 bg-white border border-slate-200 rounded-xl px-3 py-2 text-left min-w-[120px]">
                                                <div className="text-[11px] font-bold text-slate-500 uppercase tracking-wide">講師</div>
                                            </th>
                                            {actuals.matrixDates.map(dateKey => {
                                                const header = getMatrixHeaderParts(dateKey);
                                                const isToday = dateKey === actuals.todayKey;
                                                return (
                                                    <th key={`matrix_head_${dateKey}`} className={`min-w-[42px] px-0.5 py-1 text-center rounded-xl border ${isToday ? 'bg-blue-50 border-blue-200 text-blue-700' : 'bg-white border-slate-200 text-slate-500'}`}>
                                                        <div className="text-[11px] font-bold leading-none">{header.day}</div>
                                                        <div className="text-[10px] opacity-70 mt-1 leading-none">{header.weekday}</div>
                                                    </th>
                                                );
                                            })}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {actuals.availabilityMatrix.map(row => (
                                            <tr key={`matrix_${row.name}`}>
                                                <td className="sticky left-0 z-10 bg-white border border-slate-200 rounded-xl px-3 py-2 align-middle">
                                                    <div className="font-bold text-slate-700">{row.name}</div>
                                                    <div className="text-[10px] text-slate-400 mt-1">可 {row.upcomingAvailableCount} / 團 {row.upcomingBusyCount} / 休 {row.upcomingRestCount}</div>
                                                </td>
                                                {row.cells.map(cell => {
                                                    const isToday = cell.dateKey === actuals.todayKey;
                                                    const isClickable = cell.state === 'available' && typeof onMatrixCellClick === 'function';
                                                    const cellTitle = `${row.name} ${cell.dateKey} ${getMatrixCellTitle(cell)}${isClickable ? '，點擊快速開團' : ''}`;
                                                    const cellClassName = `w-9 h-9 rounded-lg border flex items-center justify-center font-bold transition-all ${getMatrixCellTone(cell.state)} ${isToday ? 'ring-1 ring-blue-300' : ''} ${isClickable ? 'cursor-pointer hover:scale-105 hover:shadow-sm' : ''}`;
                                                    return (
                                                        <td key={`${row.name}_${cell.dateKey}`} className="p-0.5">
                                                            {isClickable ? (
                                                                <button type="button" title={cellTitle} onClick={() => onMatrixCellClick(row.name, cell.dateKey)} className={cellClassName}>
                                                                    {cell.label}
                                                                </button>
                                                            ) : (
                                                                <div title={cellTitle} className={cellClassName}>
                                                                    {cell.label}
                                                                </div>
                                                            )}
                                                        </td>
                                                    );
                                                })}
                                            </tr>
                                        ))}
                                        {actuals.availabilityMatrix.length === 0 && (
                                            <tr>
                                                <td colSpan={Math.max((actuals.matrixDates?.length || 0) + 1, 2)} className="px-4 py-8 text-center text-slate-400 bg-slate-50 rounded-xl border border-dashed border-slate-200">
                                                    目前尚無可計算的講師月矩陣。
                                                </td>
                                            </tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        <div className="bg-slate-50 border border-slate-200 rounded-2xl p-4">
                            <div className="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between mb-4">
                                <div>
                                    <h3 className="text-sm font-bold text-slate-700 flex items-center gap-2"><Icon name="briefcase" size={16}/> 各活動月團數 KPI</h3>
                                    <p className="text-xs text-slate-400 mt-1">每個活動可設定本月目標團數，並同步顯示已出 / 未出。</p>
                                </div>
                                <div className="flex gap-2">
                                    <select className="px-3 py-2 rounded-lg border border-slate-200 bg-white text-sm text-slate-600" value={selectedActivity} onChange={e => setSelectedActivity(e.target.value)}>
                                        <option value="">新增活動目標...</option>
                                        {remainingEventOptions.map(name => <option key={name} value={name}>{name}</option>)}
                                    </select>
                                    <button onClick={() => { if (!selectedActivity) return; onAddActivityTarget(selectedActivity); setSelectedActivity(''); }} className="px-3 py-2 rounded-lg bg-white border border-slate-200 text-sm font-bold text-slate-600 hover:bg-slate-100 flex items-center gap-1">
                                        <Icon name="plus" size={14}/> 加入
                                    </button>
                                </div>
                            </div>
                            <div className="overflow-x-auto bg-white rounded-xl border border-slate-200">
                                <table className="w-full min-w-[760px] text-sm">
                                    <thead className="bg-slate-50 border-b border-slate-100 text-slate-500">
                                        <tr>
                                            <th className="px-4 py-3 text-left">活動名稱</th>
                                            <th className="px-4 py-3 text-center">實際團數</th>
                                            <th className="px-4 py-3 text-center">已出</th>
                                            <th className="px-4 py-3 text-center">未出</th>
                                            <th className="px-4 py-3 text-center">目標團數</th>
                                            <th className="px-4 py-3 text-center">差額</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {activityRows.map(row => (
                                            <tr key={row.name} className="hover:bg-slate-50">
                                                <td className="px-4 py-3 font-medium text-slate-700">{row.name}</td>
                                                <td className="px-4 py-3 text-center font-bold text-slate-700">{row.actual.total}</td>
                                                <td className="px-4 py-3 text-center font-bold text-emerald-600">{row.actual.completed}</td>
                                                <td className="px-4 py-3 text-center font-bold text-amber-600">{row.actual.upcoming}</td>
                                                <td className="px-4 py-3 text-center">
                                                    <input
                                                        type="number"
                                                        min="0"
                                                        className="w-24 px-2 py-1.5 rounded-lg border border-slate-200 text-center font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-200"
                                                        value={row.target}
                                                        onChange={e => onChangeActivityTarget(row.name, e.target.value)}
                                                        placeholder="-"
                                                    />
                                                </td>
                                                <td className="px-4 py-3 text-center text-xs text-slate-400">{row.target === '' || row.target === null || row.target === undefined ? '未設定' : `${row.actual.total - Number(row.target)} 團`}</td>
                                            </tr>
                                        ))}
                                        {activityRows.length === 0 && (
                                            <tr><td colSpan="6" className="px-4 py-8 text-center text-slate-400">本月尚無活動，也尚未設定活動 KPI。</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const MonthlyReport = ({ month, data, events, eventConfigs }) => {
            const [expanded, setExpanded] = useState(false);

            const stats = useMemo(() => {
                const rev = data.reduce((sum, row) => sum + (Number(row.price) || 0), 0);
                const pax = data.length;
                const sources = {};
                const monthlyActivityMap = {};
                const leadInstructorMap = {};
                const supportInstructorMap = {};

                const createSplitCounter = () => ({ total: 0, completed: 0, upcoming: 0 });
                const createActivityCounter = () => ({
                    sessions: createSplitCounter(),
                    pax: createSplitCounter(),
                    revenue: createSplitCounter()
                });
                const bumpSplit = (counter, bucket, amount = 1) => {
                    counter.total += amount;
                    counter[bucket] += amount;
                };
                const getDateKey = (value) => {
                    if (!value) return '';
                    if (value instanceof Date) {
                        return `${value.getFullYear()}-${String(value.getMonth() + 1).padStart(2, '0')}-${String(value.getDate()).padStart(2, '0')}`;
                    }
                    const raw = String(value).trim();
                    const match = raw.match(/^(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})/);
                    if (!match) return raw;
                    return `${match[1]}-${String(parseInt(match[2], 10)).padStart(2, '0')}-${String(parseInt(match[3], 10)).padStart(2, '0')}`;
                };
                const getMonthKey = (value) => {
                    const dateKey = getDateKey(value);
                    return dateKey ? dateKey.slice(0, 7) : '';
                };
                const todayKey = getDateKey(new Date());
                const parseInstructorNames = (value) => String(value || '')
                    .split(/[&,]/)
                    .map(part => part.trim())
                    .filter(name => name && name !== '未定');
                const monthSummary = {
                    sessions: createSplitCounter(),
                    pax: createSplitCounter(),
                    leadTrips: createSplitCounter(),
                    supportTrips: createSplitCounter()
                };

                data.forEach(row => {
                    const rawSrc = row.source || '未知';
                    const srcParts = rawSrc.split(/\s+/).filter(part => part.trim().length > 0);
                    if (srcParts.length === 0) srcParts.push('未知');
                    srcParts.forEach(part => {
                        sources[part] = (sources[part] || 0) + 1;
                    });
                });

                Object.values(events || {})
                    .filter(evt => evt?.date && getMonthKey(evt.date) === month)
                    .forEach(evt => {
                        const cfg = eventConfigs?.[evt.key] || {};
                        if (cfg.isCancelled) return;

                        const dateKey = getDateKey(evt.date);
                        const bucket = dateKey && dateKey < todayKey ? 'completed' : 'upcoming';
                        const customers = Array.isArray(evt.customers) ? evt.customers : [];
                        const paxCount = Number.isFinite(Number(evt.count)) ? Number(evt.count) : customers.length;
                        const revenue = customers.reduce((sum, customer) => sum + (Number(customer.price) || 0), 0);

                        if (!monthlyActivityMap[evt.eventName]) {
                            monthlyActivityMap[evt.eventName] = createActivityCounter();
                        }
                        const activityRow = monthlyActivityMap[evt.eventName];
                        bumpSplit(activityRow.sessions, bucket, 1);
                        bumpSplit(activityRow.pax, bucket, paxCount);
                        bumpSplit(activityRow.revenue, bucket, revenue);
                        bumpSplit(monthSummary.sessions, bucket, 1);
                        bumpSplit(monthSummary.pax, bucket, paxCount);

                        const leadNames = Array.from(new Set(
                            (Array.isArray(cfg.leadInstructors) && cfg.leadInstructors.length > 0)
                                ? cfg.leadInstructors.map(name => String(name || '').trim()).filter(Boolean)
                                : parseInstructorNames(evt.instructor)
                        ));
                        const supportNames = Array.from(new Set(
                            Array.isArray(cfg.supportInstructors)
                                ? cfg.supportInstructors.map(name => String(name || '').trim()).filter(Boolean)
                                : []
                        ));

                        leadNames.forEach(name => {
                            if (!name || name === '未定') return;
                            if (!leadInstructorMap[name]) leadInstructorMap[name] = createSplitCounter();
                            bumpSplit(leadInstructorMap[name], bucket, 1);
                            bumpSplit(monthSummary.leadTrips, bucket, 1);
                        });
                        supportNames.forEach(name => {
                            if (!name || name === '未定') return;
                            if (!supportInstructorMap[name]) supportInstructorMap[name] = createSplitCounter();
                            bumpSplit(supportInstructorMap[name], bucket, 1);
                            bumpSplit(monthSummary.supportTrips, bucket, 1);
                        });
                    });

                const monthlyActivityRows = Object.entries(monthlyActivityMap)
                    .sort((a, b) => (b[1].sessions.total - a[1].sessions.total) || (b[1].pax.total - a[1].pax.total) || a[0].localeCompare(b[0]));
                const leadInstructorRows = Object.entries(leadInstructorMap)
                    .sort((a, b) => (b[1].total - a[1].total) || a[0].localeCompare(b[0]));
                const supportInstructorRows = Object.entries(supportInstructorMap)
                    .sort((a, b) => (b[1].total - a[1].total) || a[0].localeCompare(b[0]));

                return { rev, pax, sources, monthlyActivityRows, leadInstructorRows, supportInstructorRows, monthSummary };
            }, [data, events, eventConfigs, month]);

            const handleDownloadReport = (e) => {
                e.stopPropagation();

                const toCsvCell = (value) => {
                    if (value === null || value === undefined) return '';
                    const str = String(value);
                    if (str.includes(',') || str.includes('"') || str.includes('\n')) {
                        return `"${str.replace(/"/g, '""')}"`;
                    }
                    return str;
                };
                const toCsvLine = (fields) => fields.map(toCsvCell).join(',');
                const sourceRows = Object.entries(stats.sources)
                    .sort((a, b) => (b[1] - a[1]) || a[0].localeCompare(b[0]));
                const lines = [];

                lines.push(toCsvLine(['月份', month]));
                lines.push(toCsvLine(['總營收', stats.rev]));
                lines.push(toCsvLine(['總人數（已扣除流團）', stats.monthSummary.pax.total]));
                lines.push(toCsvLine(['總團數（已扣除流團）', stats.monthSummary.sessions.total]));
                lines.push(toCsvLine(['主講師總出團', stats.monthSummary.leadTrips.total]));
                lines.push(toCsvLine(['跟團講師總出團', stats.monthSummary.supportTrips.total]));
                lines.push('');
                lines.push('月統計概覽（已出 = 日期早於今天，已扣除流團）');
                lines.push(toCsvLine(['項目', '總數', '已出', '未出']));
                lines.push(toCsvLine(['活動團數', stats.monthSummary.sessions.total, stats.monthSummary.sessions.completed, stats.monthSummary.sessions.upcoming]));
                lines.push(toCsvLine(['活動人數', stats.monthSummary.pax.total, stats.monthSummary.pax.completed, stats.monthSummary.pax.upcoming]));
                lines.push(toCsvLine(['主講師出團', stats.monthSummary.leadTrips.total, stats.monthSummary.leadTrips.completed, stats.monthSummary.leadTrips.upcoming]));
                lines.push(toCsvLine(['跟團講師出團', stats.monthSummary.supportTrips.total, stats.monthSummary.supportTrips.completed, stats.monthSummary.supportTrips.upcoming]));

                lines.push('');
                lines.push('每一場活動統計（已扣除流團）');
                lines.push(toCsvLine(['活動名稱', '總團數', '已出團數', '未出團數', '總人數', '已出人數', '未出人數', '總營收']));
                if (stats.monthlyActivityRows.length === 0) {
                    lines.push(toCsvLine(['無資料', 0, 0, 0, 0, 0, 0, 0]));
                } else {
                    stats.monthlyActivityRows.forEach(([name, row]) => {
                        lines.push(toCsvLine([
                            name,
                            row.sessions.total,
                            row.sessions.completed,
                            row.sessions.upcoming,
                            row.pax.total,
                            row.pax.completed,
                            row.pax.upcoming,
                            row.revenue.total
                        ]));
                    });
                }

                lines.push('');
                lines.push('主講師出團數（已扣除流團）');
                lines.push(toCsvLine(['講師', '總出團數', '已出', '未出']));
                if (stats.leadInstructorRows.length === 0) {
                    lines.push(toCsvLine(['無資料', 0, 0, 0]));
                } else {
                    stats.leadInstructorRows.forEach(([name, row]) => {
                        lines.push(toCsvLine([name, row.total, row.completed, row.upcoming]));
                    });
                }

                lines.push('');
                lines.push('跟團講師出團數（已扣除流團）');
                lines.push(toCsvLine(['講師', '總出團數', '已出', '未出']));
                if (stats.supportInstructorRows.length === 0) {
                    lines.push(toCsvLine(['無資料', 0, 0, 0]));
                } else {
                    stats.supportInstructorRows.forEach(([name, row]) => {
                        lines.push(toCsvLine([name, row.total, row.completed, row.upcoming]));
                    });
                }

                lines.push('');
                lines.push('報名管道分析');
                lines.push(toCsvLine(['來源', '人數', '占比']));
                if (sourceRows.length === 0) {
                    lines.push(toCsvLine(['無資料', 0, '0%']));
                } else {
                    sourceRows.forEach(([src, count]) => {
                        const ratio = stats.pax > 0 ? `${Math.round((count / stats.pax) * 100)}%` : '0%';
                        lines.push(toCsvLine([src, count, ratio]));
                    });
                }

                lines.push('');
                lines.push('詳細資料');
                lines.push(CSV_HEADER);
                data.forEach(row => {
                    lines.push(toCsvLine([
                        row.date || '',
                        row.eventName || '',
                        row.instructor || '',
                        row.customerName || '',
                        Number(row.price) || 0,
                        row.transport || '',
                        row.idNo || '',
                        row.birthday || '',
                        row.email || '',
                        row.source || '',
                        row.socialName || '',
                        row.notes || '',
                        row.orderDate || '',
                        row.phone || '',
                        row.isCheckedIn ? 1 : 0
                    ]));
                });

                downloadCSV(lines.join('\n'), `${month}_report.csv`);
            };

            return (
                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mb-4 transition-all">
                    <div className="p-4 flex justify-between items-start gap-4 cursor-pointer hover:bg-slate-50" onClick={() => setExpanded(!expanded)}>
                        <div className="flex-1 min-w-0">
                            <div className="flex flex-wrap items-center gap-3">
                                <div className="text-lg font-bold text-slate-700">{month}</div>
                                <div className="text-sm text-slate-500 bg-slate-100 px-2 py-0.5 rounded">總收 ${stats.rev.toLocaleString()}</div>
                                <div className="text-sm text-slate-500">({stats.monthSummary.pax.total} 人)</div>
                            </div>
                            <div className="flex flex-wrap gap-2 mt-3">
                                <div className="text-xs px-2.5 py-1 rounded-full bg-blue-50 text-blue-700 border border-blue-100">總團數 {stats.monthSummary.sessions.total} 團</div>
                                <div className="text-xs px-2.5 py-1 rounded-full bg-emerald-50 text-emerald-700 border border-emerald-100">總人數 {stats.monthSummary.pax.total} 人</div>
                                <div className="text-xs px-2.5 py-1 rounded-full bg-indigo-50 text-indigo-700 border border-indigo-100">主講 {stats.monthSummary.leadTrips.total} 團</div>
                                <div className="text-xs px-2.5 py-1 rounded-full bg-amber-50 text-amber-700 border border-amber-100">跟團 {stats.monthSummary.supportTrips.total} 團</div>
                            </div>
                        </div>
                        <Icon name={expanded ? 'chevron-up' : 'chevron-down'} className="text-slate-400 mt-1 shrink-0"/>
                    </div>
                    {expanded && (
                        <div className="p-4 border-t border-slate-100 bg-slate-50/50 animate-in fade-in space-y-6">
                            <div>
                                <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 mb-3">
                                    <h5 className="text-xs font-bold text-slate-500 uppercase flex items-center"><Icon name="layout-grid" size={14} className="mr-1"/> 出團概覽</h5>
                                    <span className="text-[11px] text-slate-400">已出 = 日期早於今天；未出 = 今天起尚未執行；已扣除流團</span>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-3">
                                    {[
                                        { label: '活動團數', icon: 'calendar-days', iconClass: 'text-blue-600', stat: stats.monthSummary.sessions },
                                        { label: '活動人數', icon: 'users', iconClass: 'text-emerald-600', stat: stats.monthSummary.pax },
                                        { label: '主講師出團', icon: 'briefcase', iconClass: 'text-indigo-600', stat: stats.monthSummary.leadTrips },
                                        { label: '跟團講師出團', icon: 'user-plus', iconClass: 'text-amber-600', stat: stats.monthSummary.supportTrips }
                                    ].map(card => (
                                        <div key={card.label} className="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
                                            <div className="text-xs font-bold text-slate-500 uppercase flex items-center gap-2 mb-3">
                                                <Icon name={card.icon} size={14} className={card.iconClass}/>
                                                {card.label}
                                            </div>
                                            <div className="grid grid-cols-3 gap-3">
                                                <div>
                                                    <div className="text-[10px] text-slate-400 font-bold mb-1">總數</div>
                                                    <div className="text-lg font-bold text-slate-800">{card.stat.total}</div>
                                                </div>
                                                <div>
                                                    <div className="text-[10px] text-slate-400 font-bold mb-1">已出</div>
                                                    <div className="text-lg font-bold text-emerald-600">{card.stat.completed}</div>
                                                </div>
                                                <div>
                                                    <div className="text-[10px] text-slate-400 font-bold mb-1">未出</div>
                                                    <div className="text-lg font-bold text-amber-600">{card.stat.upcoming}</div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div>
                                <div className="flex items-center justify-between mb-3">
                                    <h5 className="text-xs font-bold text-slate-500 uppercase flex items-center"><Icon name="activity" size={14} className="mr-1"/> 活動團數 / 人數</h5>
                                    <span className="text-[11px] text-slate-400">每個活動都拆成總數、已出、未出</span>
                                </div>
